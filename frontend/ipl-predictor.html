<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL Score Predictor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: hsl(220, 20%, 7%);
    color: hsl(210, 20%, 92%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .container { width: 100%; max-width: 480px; }
  h1 { text-align: center; font-size: 2rem; font-weight: 700; margin-bottom: 0.25rem; }
  h1 span { color: hsl(262, 80%, 55%); }
  .subtitle { text-align: center; color: hsl(215, 12%, 55%); font-size: 0.875rem; margin-bottom: 1.5rem; }
  .card {
    background: hsl(220, 18%, 12%);
    border: 1px solid hsl(220, 14%, 20%);
    border-radius: 0.75rem;
    padding: 1.5rem;
    box-shadow: 0 0 40px hsl(262 80% 55% / 0.2);
  }
  .row { display: grid; gap: 1rem; margin-bottom: 1rem; }
  .row-2 { grid-template-columns: 1fr 1fr; }
  .row-3 { grid-template-columns: 1fr 1fr 1fr; }
  label { display: block; font-size: 0.75rem; color: hsl(215, 12%, 55%); margin-bottom: 0.375rem; }
  select, input[type="number"] {
    width: 100%;
    height: 2.5rem;
    padding: 0 0.75rem;
    background: hsl(220, 20%, 7%);
    border: 1px solid hsl(220, 14%, 22%);
    border-radius: 0.5rem;
    color: hsl(210, 20%, 92%);
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s;
  }
  select:focus, input:focus { border-color: hsl(262, 80%, 55%); box-shadow: 0 0 0 2px hsl(262 80% 55% / 0.25); }
  select option { background: hsl(220, 18%, 12%); }
  .btn {
    width: 100%;
    height: 2.5rem;
    background: hsl(262, 80%, 55%);
    color: #fff;
    border: none;
    border-radius: 0.5rem;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 0.5rem;
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: hsl(0, 72%, 50%); font-size: 0.875rem; margin-top: 0.5rem; }
  .result {
    text-align: center;
    padding: 1rem;
    margin-top: 1rem;
    background: hsl(220, 16%, 18%);
    border-radius: 0.5rem;
    display: none;
  }
  .result p { color: hsl(215, 12%, 55%); font-size: 0.875rem; }
  .result .score { font-size: 2.5rem; font-weight: 700; color: hsl(38, 90%, 55%); margin-top: 0.25rem; }
</style>
</head>
<body>
<div class="container">
  <h1>IPL Score <span>Predictor</span></h1>
  <p class="subtitle">Predict the final score using live match data</p>
  <div class="card">
    <form id="form">
      <div class="row row-2">
        <div>
          <label>Batting Team</label>
          <select id="batting_team" required><option value="">Select</option></select>
        </div>
        <div>
          <label>Bowling Team</label>
          <select id="bowling_team" required><option value="">Select</option></select>
        </div>
      </div>
      <div class="row row-3">
        <div><label>Runs</label><input type="number" id="runs" min="0" value="0"></div>
        <div><label>Wickets</label><input type="number" id="wickets" min="0" max="10" value="0"></div>
        <div><label>Overs</label><input type="number" id="overs" min="0" max="20" step="0.1" value="0"></div>
      </div>
      <div class="row row-2">
        <div><label>Runs (Last 5 Overs)</label><input type="number" id="runs_last_5" min="0" value="0"></div>
        <div><label>Wickets (Last 5 Overs)</label><input type="number" id="wickets_last_5" min="0" max="10" value="0"></div>
      </div>
      <div id="error" class="error"></div>
      <button type="submit" class="btn" id="submitBtn">Predict Score</button>
    </form>
    <div class="result" id="result">
      <p>Predicted Final Score</p>
      <div class="score" id="score"></div>
    </div>
  </div>
</div>
<script>
const API_URL = "http://127.0.0.1:8000";
const teams = [
  "Chennai Super Kings","Delhi Daredevils","Kings XI Punjab",
  "Kolkata Knight Riders","Mumbai Indians","Rajasthan Royals",
  "Royal Challengers Bangalore","Sunrisers Hyderabad"
];

["batting_team","bowling_team"].forEach(id => {
  const sel = document.getElementById(id);
  teams.forEach(t => { const o = document.createElement("option"); o.value = t; o.textContent = t; sel.appendChild(o); });
});

document.getElementById("form").addEventListener("submit", async e => {
  e.preventDefault();
  const bat = document.getElementById("batting_team").value;
  const bowl = document.getElementById("bowling_team").value;
  const errEl = document.getElementById("error");
  const resultEl = document.getElementById("result");
  const btn = document.getElementById("submitBtn");

  if (!bat || !bowl) { errEl.textContent = "Please select both teams"; return; }
  if (bat === bowl) { errEl.textContent = "Batting and bowling teams must be different"; return; }
  errEl.textContent = "";
  resultEl.style.display = "none";
  btn.disabled = true; btn.textContent = "Predicting...";

  try {
    const res = await fetch(API_URL + "/predict", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        batting_team: bat, bowling_team: bowl,
        runs: +document.getElementById("runs").value || 0,
        wickets: +document.getElementById("wickets").value || 0,
        overs: +document.getElementById("overs").value || 0,
        runs_last_5: +document.getElementById("runs_last_5").value || 0,
        wickets_last_5: +document.getElementById("wickets_last_5").value || 0
      })
    });
    const data = await res.json();
    document.getElementById("score").textContent = data.predicted_score;
    resultEl.style.display = "block";
  } catch { errEl.textContent = "Failed to connect to prediction server"; }
  finally { btn.disabled = false; btn.textContent = "Predict Score"; }
});
</script>
</body>
</html>
